# Aura Self-Hosted Backend
#
# Usage:
#   1. Copy this file to a directory on your server
#   2. Generate a JWT secret: openssl rand -hex 32
#   3. Replace "please-change-this-secret" below with your generated secret
#   4. Run: docker compose up -d
#   5. Point the Aura app at http://<your-server-ip>:3400

services:
  aura:
    image: hoidhopper/aura-backend:latest
    container_name: aura-backend
    restart: unless-stopped
    ports:
      - "3400:3400"
    volumes:
      - aura-data:/data
    environment:
      - PORT=3400
      # REQUIRED: Change this to a strong random secret before running.
      # Generate one with: openssl rand -hex 32
      - JWT_SECRET=${JWT_SECRET:-please-change-this-secret}
      - AURA_DB_PATH=/data/aura.db

volumes:
  aura-data:
    driver: local
